    const regionColors = {
      'Central': '#4CAF50',
      'West': '#2196F3',
      'North': '#F44336',
      'North-East': '#FF9800',
      'East': '#9C27B0'
    };

    // Decompress and parse GeoJSON
    const compressed = Uint8Array.from(atob(BASE64_DATA), c => c.charCodeAt(0));
    const decompressed = pako.inflate(compressed, { to: 'string' });
    const geojson = JSON.parse(decompressed);

    // Get unique districts and their regions
    const districts = {};
    geojson.features.forEach(f => {
      const district = f.properties.district;
      const region = f.properties.region;
      if (district && !districts[district]) {
        districts[district] = region;
      }
    });

    // Create SVG
    const width = 800;
    const height = 700;
    const svg = d3.select('#map')
      .attr('viewBox', `0 0 ${width} ${height}`);

    // Projection for Singapore
    const projection = d3.geoMercator()
      .center([103.8, 1.36])
      .scale(35000)
      .translate([width / 2, height / 2]);

    const path = d3.geoPath().projection(projection);

    // Add district polygons
    svg.selectAll('path')
      .data(geojson.features)
      .enter()
      .append('path')
      .attr('d', path)
      .attr('fill', d => {
        const region = d.properties.region;
        return region ? regionColors[region] : '#ccc';
      })
      .attr('stroke', 'white')
      .attr('stroke-width', 1);

    // Add district labels
    svg.selectAll('text')
      .data(geojson.features)
      .enter()
      .append('text')
      .attr('class', 'district-label')
      .attr('transform', d => `translate(${path.centroid(d)})`)
      .text(d => d.properties.district);

    // Legend
    const legend = svg.append('g')
      .attr('class', 'legend')
      .attr('transform', `translate(${width - 120}, ${height - 130})`);

    legend.append('rect')
      .attr('width', 110)
      .attr('height', 115)
      .attr('fill', '#fff')
      .attr('stroke', '#ccc')
      .attr('rx', 4);

    const legendData = [
      { region: 'Central', color: '#4CAF50' },
      { region: 'West', color: '#2196F3' },
      { region: 'North', color: '#F44336' },
      { region: 'North-East', color: '#FF9800' },
      { region: 'East', color: '#9C27B0' }
    ];

    legend.selectAll('rect.legend-color')
      .data(legendData)
      .enter()
      .append('rect')
      .attr('x', 10)
      .attr('y', (d, i) => 18 + i * 18)
      .attr('width', 14)
      .attr('height', 14)
      .attr('fill', d => d.color)
      .attr('rx', 2);

    legend.selectAll('text.legend-label')
      .data(legendData)
      .enter()
      .append('text')
      .attr('x', 30)
      .attr('y', (d, i) => 18 + i * 18)
      .attr('dy', '0.35em')
      .text(d => d.region);

    legend.append('text')
      .attr('x', 55)
      .attr('y', 10)
      .attr('text-anchor', 'middle')
      .attr('font-weight', '600')
      .text('URA Region');
