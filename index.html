<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Singapore Postal Districts</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #map { width: 100vw; height: 100vh; }
    .legend { background: white; padding: 12px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.25); font-size: 13px; }
    .legend h4 { margin: 0 0 8px 0; font-size: 14px; }
    .legend-item { display: flex; align-items: center; margin: 4px 0; }
    .legend-color { width: 16px; height: 16px; border-radius: 3px; margin-right: 8px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    const map = L.map('map').setView([1.3521, 103.8198], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const regionColors = {
      'Central': '#4CAF50',
      'West': '#2196F3',
      'North': '#F44336',
      'North-East': '#FF9800',
      'East': '#9C27B0'
    };

    const districtToRegion = {};
    ['01','02','03','04','06','07','08','09','10','11','12','13','20','21'].forEach(d => districtToRegion[d] = 'Central');
    ['05','22','23','24'].forEach(d => districtToRegion[d] = 'West');
    ['25','26','27'].forEach(d => districtToRegion[d] = 'North');
    ['19','28'].forEach(d => districtToRegion[d] = 'North-East');
    ['14','15','16','17','18'].forEach(d => districtToRegion[d] = 'East');

    // Approximate polygon boundaries for each district
    const districts = {
      '01': [[1.2894, 103.8500], [1.2894, 103.8600], [1.2830, 103.8600], [1.2830, 103.8500]],
      '02': [[1.2830, 103.8500], [1.2830, 103.8600], [1.2770, 103.8550], [1.2770, 103.8450]],
      '03': [[1.2770, 103.8300], [1.2770, 103.8500], [1.2850, 103.8500], [1.2850, 103.8300]],
      '04': [[1.2650, 103.8200], [1.2650, 103.8400], [1.2550, 103.8400], [1.2550, 103.8200]],
      '05': [[1.3100, 103.7600], [1.3100, 103.8000], [1.2800, 103.8000], [1.2800, 103.7600]],
      '06': [[1.2950, 103.8000], [1.2950, 103.8300], [1.2800, 103.8300], [1.2800, 103.8000]],
      '07': [[1.3000, 103.8500], [1.3000, 103.8700], [1.2850, 103.8700], [1.2850, 103.8500]],
      '08': [[1.3100, 103.8200], [1.3100, 103.8500], [1.2950, 103.8500], [1.2950, 103.8200]],
      '09': [[1.3000, 103.8300], [1.3000, 103.8550], [1.2900, 103.8550], [1.2900, 103.8300]],
      '10': [[1.3000, 103.8200], [1.3000, 103.8500], [1.2850, 103.8500], [1.2850, 103.8200]],
      '11': [[1.3300, 103.8300], [1.3300, 103.8600], [1.3100, 103.8600], [1.3100, 103.8300]],
      '12': [[1.3500, 103.8300], [1.3500, 103.8700], [1.3300, 103.8700], [1.3300, 103.8300]],
      '13': [[1.3450, 103.8700], [1.3450, 103.9000], [1.3300, 103.9000], [1.3300, 103.8700]],
      '14': [[1.3150, 103.9000], [1.3150, 103.9300], [1.3000, 103.9300], [1.3000, 103.9000]],
      '15': [[1.3050, 103.9000], [1.3050, 103.9300], [1.2900, 103.9300], [1.2900, 103.9000]],
      '16': [[1.3200, 103.9300], [1.3200, 103.9700], [1.3050, 103.9700], [1.3050, 103.9300]],
      '17': [[1.3400, 103.9500], [1.3400, 103.9900], [1.3200, 103.9900], [1.3200, 103.9500]],
      '18': [[1.3550, 103.9300], [1.3550, 103.9800], [1.3400, 103.9800], [1.3400, 103.9300]],
      '19': [[1.3550, 103.8700], [1.3550, 103.9200], [1.3450, 103.9200], [1.3450, 103.8700]],
      '20': [[1.4400, 103.7800], [1.4400, 103.8300], [1.4200, 103.8300], [1.4200, 103.7800]],
      '21': [[1.3300, 103.7900], [1.3300, 103.8300], [1.3100, 103.8300], [1.3100, 103.7900]],
      '22': [[1.3400, 103.7100], [1.3400, 103.7600], [1.3000, 103.7600], [1.3000, 103.7100]],
      '23': [[1.3800, 103.7600], [1.3800, 103.8100], [1.3400, 103.8100], [1.3400, 103.7600]],
      '24': [[1.3800, 103.7100], [1.3800, 103.7600], [1.3400, 103.7600], [1.3400, 103.7100]],
      '25': [[1.4500, 103.7800], [1.4500, 103.8300], [1.4400, 103.8300], [1.4400, 103.7800]],
      '26': [[1.4200, 103.8300], [1.4200, 103.8800], [1.4000, 103.8800], [1.4000, 103.8300]],
      '27': [[1.4300, 103.8300], [1.4300, 103.8800], [1.4000, 103.8800], [1.4000, 103.8300]],
      '28': [[1.3050, 103.8700], [1.3050, 103.9000], [1.2900, 103.9000], [1.2900, 103.8700]]
    };

    // Add district polygons
    Object.keys(districts).forEach(d => {
      const region = districtToRegion[d];
      const color = regionColors[region];
      L.polygon(districts[d], {
        color: 'white',
        weight: 2,
        fillColor: color,
        fillOpacity: 0.6
      }).addTo(map).bindPopup(`District ${d} (${region})`);
    });

    // Add legend
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = function() {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = '<h4>URA Region</h4>';
      Object.keys(regionColors).forEach(region => {
        div.innerHTML += `<div class="legend-item"><div class="legend-color" style="background:${regionColors[region]}"></div>${region}</div>`;
      });
      return div;
    };
    legend.addTo(map);
  </script>
</body>
</html>
